version: 2

# Single pnpm entry at the workspace root.
# The root pnpm-lock.yaml covers every package.json in the workspace,
# so per-directory entries don't apply (they would update sub-package
# manifests without touching the root lockfile, leaving every PR
# unmergeable on `pnpm install --frozen-lockfile`).
updates:
  - package-ecosystem: pnpm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
