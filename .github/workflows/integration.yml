name: Integration Tests

on:
  schedule:
    # Run integration tests daily at 2:00 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    # Allow manual triggering for debugging

jobs:
  integration:
    name: Horizon Integration Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run integration tests
        env:
          INTEGRATION_TESTS: true
          # Deployed testnet contract + funded invoker account - see
          # contracts/deploy/deploy_testnet.sh. Unset until those repo
          # secrets are added, in which case the live Soroban case in
          # test/integration/soroban.test.ts self-skips with a clear message.
          SOROBAN_CONTRACT_ID: ${{ secrets.SOROBAN_CONTRACT_ID }}
          SOROBAN_INVOKER_SECRET: ${{ secrets.SOROBAN_INVOKER_SECRET }}
        run: pnpm test:integration
        timeout-minutes: 10

      - name: Report integration test status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Integration tests passed successfully"
          else
            echo "Integration tests failed"
            echo "Check the logs above for details about the failure"
          fi
